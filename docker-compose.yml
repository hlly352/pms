version: "3.9"

services:
  backend:
    build: ./backend
    container_name: laravel
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_DATABASE: pms
      MYSQL_USER: root
      MYSQL_PASSWORD: jiatailong
      MYSQL_ROOT_PASSWORD: jiatailong
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  frontend:
    build: ./frontend
    container_name: vue
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/vue
      - ./backend/public:/var/www/backend/public
    depends_on:
      - backend

volumes:
  db_data: